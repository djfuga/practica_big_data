# =============================================================
# Configuracion Spark - Practica Big Data 2026 (REST Catalog)
# Iceberg via REST Catalog + S3FileIO. SIN hadoop-aws.
# =============================================================

# --- Iceberg: extension SQL ---
spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# --- Catalogo 'lakehouse' de tipo REST ---
spark.sql.catalog.lakehouse                         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lakehouse.type                    rest
spark.sql.catalog.lakehouse.uri                     http://iceberg-rest:8181
spark.sql.catalog.lakehouse.warehouse               s3://lakehouse/warehouse

# --- S3FileIO para que los executors lean/escriban datos en MinIO ---
spark.sql.catalog.lakehouse.io-impl                 org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.lakehouse.s3.endpoint             http://minio:9000
spark.sql.catalog.lakehouse.s3.path-style-access    true
spark.sql.catalog.lakehouse.s3.access-key-id        bigdata
spark.sql.catalog.lakehouse.s3.secret-access-key    bigdata-secret-2026
spark.sql.catalog.lakehouse.client.region                  us-east-1

# --- Catalogo por defecto ---
spark.sql.defaultCatalog                            lakehouse

# --- Tuning para WSL2 ---
spark.sql.shuffle.partitions                        4
spark.driver.memory                                 1g
spark.executor.memory                               1g


# --- Metricas Prometheus (sesion 3 - observabilidad) ---
# Habilita endpoints /metrics/<rol>/prometheus en cada componente de Spark
# Master expone metricas en su puerto UI (8080)
# Worker expone metricas en su puerto UI (8081)
# Driver/Executors exponen en puertos dinamicos asignados por Spark
spark.metrics.conf.*.sink.prometheusServlet.class                org.apache.spark.metrics.sink.PrometheusServlet
spark.metrics.conf.*.sink.prometheusServlet.path                 /metrics/prometheus
spark.metrics.conf.master.sink.prometheusServlet.path            /metrics/master/prometheus
spark.metrics.conf.applications.sink.prometheusServlet.path      /metrics/applications/prometheus

# Habilitar metricas de la JVM en todos los componentes
spark.metrics.conf.*.source.jvm.class                            org.apache.spark.metrics.source.JvmSource
