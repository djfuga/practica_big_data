# =============================================================
# Practica Big Data 2026 - Parte II
# Stack docker-compose
# =============================================================

name: bigdata-practica

networks:
  bigdata-net:
    driver: bridge
    name: bigdata-net

volumes:
  minio-data:
    name: bigdata-minio-data
  kafka-data:
    name: bigdata-kafka-data
  cassandra-data:
    name: bigdata-cassandra-data
  postgres-data:
    name: bigdata-postgres-data

services:

  # ===========================================================
  # MinIO - Object Storage S3-compatible (Lakehouse)
  # ===========================================================
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: bigdata-minio
    restart: unless-stopped
    networks:
      - bigdata-net
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:${MINIO_CONSOLE_PORT:-9001}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-03T17-07-56Z
    container_name: bigdata-minio-init
    networks:
      - bigdata-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_APP_USER: ${MINIO_APP_USER}
      MINIO_APP_PASSWORD: ${MINIO_APP_PASSWORD}
      MINIO_LAKEHOUSE_BUCKET: ${MINIO_LAKEHOUSE_BUCKET}
    volumes:
      - ./bootstrap/minio-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]

  # ===========================================================
  # Kafka 4.2.0 (KRaft, single-node)
  # ===========================================================
  kafka:
    image: apache/kafka:4.2.0
    container_name: bigdata-kafka
    restart: unless-stopped
    networks:
      - bigdata-net
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:9092,PLAINTEXT_EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: bigdata-kafka-init
    networks:
      - bigdata-net
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./bootstrap/kafka-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]

  # ===========================================================
  # Cassandra 5.0 - BD analitica (distancias + predicciones)
  # ===========================================================
  cassandra:
    image: cassandra:5.0
    container_name: bigdata-cassandra
    restart: unless-stopped
    networks:
      - bigdata-net
    ports:
      # 9042 = puerto nativo CQL (clientes: cassandra-driver, Spark connector)
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      # Nombre del cluster (cosmetico en single-node)
      CASSANDRA_CLUSTER_NAME: "BigDataCluster"
      # Snitch simple para single-node (no multi-DC)
      CASSANDRA_ENDPOINT_SNITCH: SimpleSnitch
      CASSANDRA_DC: datacenter1
      # Limitar memoria JVM de Cassandra (importante en WSL2 con RAM justa)
      # Por defecto Cassandra coge 1/4 de la RAM; lo fijamos para controlarlo
      MAX_HEAP_SIZE: "1G"
      HEAP_NEWSIZE: "256M"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      # 'cqlsh -e DESCRIBE KEYSPACES' devuelve 0 si Cassandra acepta CQL
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ===========================================================
  # cassandra-init - Job: crea keyspace y tablas
  # ===========================================================
  cassandra-init:
    image: cassandra:5.0
    container_name: bigdata-cassandra-init
    networks:
      - bigdata-net
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./bootstrap/cassandra-init.cql:/init.cql:ro
    # cqlsh apunta al host 'cassandra' y ejecuta el fichero .cql
    entrypoint: ["/bin/sh", "-c", "cqlsh cassandra -f /init.cql && echo 'Cassandra schema OK'"]


  # ===========================================================
  # Spark Master - coordinador del cluster
  # ===========================================================
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: bigdata/spark:4.1.1
    container_name: bigdata-spark-master
    restart: unless-stopped
    networks:
      - bigdata-net
    ports:
      - "${SPARK_MASTER_UI_PORT:-8080}:8080"   # Web UI del master
      - "${SPARK_MASTER_PORT:-7077}:7077"      # Puerto de cluster
    environment:
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
    volumes:
      - ./spark/tests:/opt/spark/tests:ro
      - ./spark/jobs:/opt/spark/jobs:ro
      - ../../data:/opt/spark/data:ro
      - ../../models:/opt/spark/models
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================================
  # Spark Worker - ejecutor de tareas
  # ===========================================================
  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    image: bigdata/spark:4.1.1
    container_name: bigdata-spark-worker
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark/jobs:/opt/spark/jobs:ro
      - ../../data:/opt/spark/data:ro
      - ../../models:/opt/spark/models
    ports:
      - "${SPARK_WORKER_UI_PORT:-8081}:8081"   # Web UI del worker
    environment:
      SPARK_MODE: worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --webui-port 8081
      --cores 2 --memory 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================================
  # Iceberg REST Catalog - gestiona metadata del Lakehouse
  # Imagen oficial Apache, version igual a nuestro Iceberg (1.10.1)
  # ===========================================================
  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    container_name: bigdata-iceberg-rest
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    environment:
      # Credenciales S3 para que el catalogo acceda a MinIO
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD}
      AWS_REGION: us-east-1
      # Donde guarda el warehouse (datos + metadata) en MinIO
      CATALOG_WAREHOUSE: s3://lakehouse/warehouse
      # FileIO nativo de Iceberg para S3 (SDK v2, sin hadoop-aws)
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      # Endpoint de MinIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      # Path-style obligatorio para MinIO
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8181/v1/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ===========================================================
  # Flask + SocketIO (web del usuario)
  # Lee distancias de Cassandra (punto obl. 2)
  # Recibe predicciones por Kafka y las emite por WebSocket (punto obl. 3)
  # ===========================================================
  web:
    build:
      context: ../../src/web
      dockerfile: Dockerfile
    image: bigdata/web:1.0
    container_name: bigdata-web
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5001}:5000"
    environment:
      KAFKA_BROKER: kafka:9092
      REQUEST_TOPIC: flight-delay-request
      RESPONSE_TOPIC: flight-delay-classification-response
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: flight_db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================================
  # PostgreSQL compartido: backend de Airflow + backend de MLflow
  # Dos bases de datos lógicas separadas dentro del mismo servidor.
  # ===========================================================
  postgres:
    image: postgres:16-alpine
    container_name: bigdata-postgres
    restart: unless-stopped
    networks:
      - bigdata-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bigdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigdata-postgres-2026}
      POSTGRES_MULTIPLE_DATABASES: "airflow,mlflow"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./bootstrap/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bigdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ===========================================================
  # MLflow Tracking Server
  # - Backend store: PostgreSQL (db 'mlflow')
  # - Artifact store: MinIO (s3://lakehouse/mlflow-artifacts/)
  # ===========================================================
  mlflow:
    build:
      context: ../mlflow
      dockerfile: Dockerfile
    image: bigdata/mlflow:2.18.0
    container_name: bigdata-mlflow
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${MLFLOW_PORT:-5002}:5000"
    environment:
      # Credenciales S3 para que MLflow escriba artifacts en MinIO
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MLFLOW_S3_IGNORE_TLS: "true"
    command:
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://${POSTGRES_USER:-bigdata}:${POSTGRES_PASSWORD:-bigdata-postgres-2026}@postgres:5432/mlflow
      - --default-artifact-root=s3://lakehouse/mlflow-artifacts/
      - --serve-artifacts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================
  # Airflow 2.10.5 - Orquestación de DAGs
  # 3 servicios coordinados: init (efimero), webserver, scheduler
  # Ejecutor: LocalExecutor (no necesita Celery+Redis)
  # ===========================================================
  airflow-init:
    build:
      context: ../airflow
      dockerfile: Dockerfile
    image: bigdata/airflow:2.10.5
    container_name: bigdata-airflow-init
    networks:
      - bigdata-net
    depends_on:
      postgres:
        condition: service_healthy
    user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-bigdata}:${POSTGRES_PASSWORD:-bigdata-postgres-2026}@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
      AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
      # MLflow accesible desde los DAGs
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_APP_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_APP_PASSWORD}
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/config:/opt/airflow/config
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER:-admin} \
          --password ${AIRFLOW_ADMIN_PASSWORD:-admin} \
          --firstname Admin \
          --lastname Bigdata \
          --role Admin \
          --email admin@bigdata.local || echo "Usuario ya existe, ok"
        echo "OK: Airflow inicializado"

  airflow-webserver:
    build:
      context: ../airflow
      dockerfile: Dockerfile
    image: bigdata/airflow:2.10.5
    container_name: bigdata-airflow-webserver
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    # UID airflow + GID del grupo docker del host (para acceder al socket)
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "${DOCKER_GID:-108}"
    environment: *airflow-env
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/config:/opt/airflow/config
      # Socket Docker para que los DAGs puedan 'docker exec'
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${AIRFLOW_PORT:-8082}:8080"
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build:
      context: ../airflow
      dockerfile: Dockerfile
    image: bigdata/airflow:2.10.5
    container_name: bigdata-airflow-scheduler
    restart: unless-stopped
    networks:
      - bigdata-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "${DOCKER_GID:-108}"
    environment: *airflow-env
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../airflow/plugins:/opt/airflow/plugins
      - ../airflow/config:/opt/airflow/config
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
