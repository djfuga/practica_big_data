# Service NodePort dedicado para Grafana
# Usamos el puerto 30002 que ya esta expuesto en kind-config.yaml
# (era para MLflow pero MLflow no esta en K8s)
apiVersion: v1
kind: Service
metadata:
  name: grafana-external
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: kube-prometheus-stack
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30002
