# Cassandra 5.0 - 1 replica para dev local
# El startup de Cassandra tarda ~60-90s
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: bigdata
spec:
  serviceName: cassandra-headless
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      terminationGracePeriodSeconds: 1800
      containers:
        - name: cassandra
          image: cassandra:5.0
          ports:
            - name: cql
              containerPort: 9042
            - name: intra
              containerPort: 7000
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "bigdata-cluster"
            - name: CASSANDRA_DC
              value: "datacenter1"
            - name: CASSANDRA_RACK
              value: "rack1"
            - name: CASSANDRA_ENDPOINT_SNITCH
              value: "GossipingPropertyFileSnitch"
            # Memoria JVM moderada para dev local
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "128M"
          volumeMounts:
            - name: cassandra-data
              mountPath: /var/lib/cassandra
          # Readiness con TCP (igual que aprendimos con Kafka)
          # initialDelaySeconds alto porque Cassandra es lento al arrancar
          readinessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9042
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              memory: 1Gi
              cpu: 300m
            limits:
              memory: 2Gi
              cpu: 1500m
  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
