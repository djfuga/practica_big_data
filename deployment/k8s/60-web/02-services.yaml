# ClusterIP interno
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: bigdata
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - name: http
      port: 5000
      targetPort: 5000

---
# NodePort: acceso desde el navegador (host:30050)
apiVersion: v1
kind: Service
metadata:
  name: web-external
  namespace: bigdata
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30050
