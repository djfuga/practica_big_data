# Flask Web Server con SocketIO
# - Stateless (no PVC)
# - Conecta a Kafka y Cassandra via DNS interno
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bigdata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      # No inyectes vars de Services (buena práctica preventiva)
      enableServiceLinks: false
      containers:
        - name: web
          image: bigdata/web:1.0
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: bigdata-config
                  key: KAFKA_BROKER
            - name: CASSANDRA_HOST
              valueFrom:
                configMapKeyRef:
                  name: bigdata-config
                  key: CASSANDRA_HOST
            - name: CASSANDRA_KEYSPACE
              valueFrom:
                configMapKeyRef:
                  name: bigdata-config
                  key: CASSANDRA_KEYSPACE
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
