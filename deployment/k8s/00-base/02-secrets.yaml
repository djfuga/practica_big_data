# Secrets compartidos del stack
# En producción, las contraseñas vendrían de un gestor (Vault, SealedSecrets, etc.)
# Para dev local, stringData (texto plano) es práctico.

---
# MinIO: usuario root + usuario de aplicación
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: bigdata
type: Opaque
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin123
  MINIO_APP_USER: bigdata
  MINIO_APP_PASSWORD: bigdata-secret-2026

---
# Mismas credenciales pero como variables AWS_*
# (para Spark y otros que usan SDK S3)
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: bigdata
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: bigdata
  AWS_SECRET_ACCESS_KEY: bigdata-secret-2026
  AWS_DEFAULT_REGION: us-east-1
