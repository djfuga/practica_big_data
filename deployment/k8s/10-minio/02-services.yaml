# Service 1 (headless): para que el StatefulSet asigne nombres DNS estables
# pod -> minio-0.minio-headless.bigdata.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: bigdata
spec:
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001

---
# Service 2 (ClusterIP): nombre estable interno 'minio:9000'
# Es lo que usaran Spark/Flask/Iceberg cuando hablen con MinIO
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: bigdata
spec:
  type: ClusterIP
  selector:
    app: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000

---
# Service 3 (NodePort): para acceder DESDE EL HOST (WSL2) a la consola
# y a la API S3 (para 'mc' desde el host, smoke tests, etc.)
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: bigdata
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30090
    - name: s3-external
      port: 9000
      targetPort: 9000
      nodePort: 30091
