# NodePort solo para UI del worker (puerto 30181 del host)
apiVersion: v1
kind: Service
metadata:
  name: spark-worker-ui
  namespace: bigdata
  labels:
    app: spark-worker
spec:
  type: NodePort
  selector:
    app: spark-worker
  ports:
    - name: ui
      port: 8081
      targetPort: 8081
      nodePort: 30181
